
<!DOCTYPE html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>OtelPro | Stok & Satış Takip</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              primary: '#6366f1',
              secondary: '#4f46e5',
              dark: '#0f172a',
            },
            borderRadius: {
              '3xl': '1.5rem',
              '4xl': '2rem',
            }
          }
        }
      }
    </script>
    <style>
      body { font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased; }
      ::-webkit-scrollbar { width: 6px; height: 6px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
      ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
      .glass-card { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.3); }
      .animate-fade-in { animation: fadeIn 0.4s ease-out; }
      @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
      
      /* KRİTİK: Input Görünürlük Düzeltmeleri */
      input, select, textarea {
        color: #0f172a !important; /* Metni kesinlikle koyu lacivert/siyah yap */
        background-color: #ffffff !important; /* Arka planı kesinlikle beyaz yap */
        opacity: 1 !important;
      }

      /* Chrome/Safari Otomatik Doldurma (Autofill) Metin Rengi Düzeltmesi */
      input:-webkit-autofill,
      input:-webkit-autofill:hover, 
      input:-webkit-autofill:focus,
      input:-webkit-autofill:active {
        -webkit-box-shadow: 0 0 0 30px white inset !important;
        -webkit-text-fill-color: #0f172a !important;
        transition: background-color 5000s ease-in-out 0s;
      }
      
      /* Koyu arka planlı alanlardaki inputlar için istisna */
      .bg-slate-900 input {
        color: #ffffff !important;
        background-color: rgba(255, 255, 255, 0.1) !important;
        -webkit-text-fill-color: #ffffff !important;
      }
      
      /* Beyaz kart içindeki inputlar için zorunlu koyu metin */
      .bg-white input {
        color: #0f172a !important;
        -webkit-text-fill-color: #0f172a !important;
      }

      input::placeholder {
        color: #94a3b8 !important;
        opacity: 0.6;
      }
    </style>
    <script type="importmap">
    {
      "imports": {
        "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
        "@google/genai": "https://esm.sh/@google/genai@^1.34.0",
        "lucide-react": "https://esm.sh/lucide-react@^0.562.0",
        "recharts": "https://esm.sh/recharts@^3.6.0",
        "jspdf": "https://esm.sh/jspdf@^4.0.0",
        "vite": "https://esm.sh/vite@^7.3.0",
        "@vitejs/plugin-react": "https://esm.sh/@vitejs/plugin-react@^5.1.2",
        "react/": "https://esm.sh/react@^19.2.3/",
        "react": "https://esm.sh/react@^19.2.3",
        "vite-plugin-electron": "https://esm.sh/vite-plugin-electron@^0.29.0",
        "electron": "https://esm.sh/electron@^39.2.7",
        "jspdf-autotable": "https://esm.sh/jspdf-autotable@^5.0.2",
        "vite-plugin-electron-renderer": "https://esm.sh/vite-plugin-electron-renderer@^0.14.6"
      }
    }
    </script>
  </head>
  <body class="bg-[#f8fafc] text-slate-900 overflow-hidden">
    <div id="root" class="h-screen w-screen overflow-hidden"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
